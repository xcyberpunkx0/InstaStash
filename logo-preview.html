<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InstaStash — Logo Preview</title>
<style>
  body{margin:0;background:#EFE9E1;font-family:-apple-system,"Segoe UI",sans-serif;color:#1F1B16;display:flex;flex-direction:column;align-items:center;gap:36px;padding:48px 20px;}
  h1{font-weight:600;letter-spacing:.5px;margin:0;font-size:1.2rem;color:#6b6157;}
  .card{background:#F7F3EE;border:1px solid #e3dccf;border-radius:16px;padding:34px 44px;box-shadow:0 8px 24px rgba(31,27,22,.08);display:flex;align-items:center;gap:28px;}
  .label{font-size:.78rem;color:#9a8f80;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;text-align:center;}
  .row{display:flex;gap:24px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .dark{background:#1F1B16;}
  .dark .label{color:#8a8276;}
  section{text-align:center;}
</style>
</head>
<body>
  <h1>InstaStash — new “I S” mark</h1>

  <section>
    <div class="label">Mark only (favicon / app icon)</div>
    <div class="row">
      <div class="card">
        <!-- 48x48 mark @ 96 -->

        </svg>
        <!-- @48 -->
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 6 C 6 4, 8 2, 10 2 L 38 2 C 40 2, 42 4, 42 6 L 42 44 C 42 46, 40 48, 38 48 L 10 48 C 8 48, 6 46, 6 44 Z" fill="#F7F3EE" stroke="#1F1B16" stroke-width="1.8"/>

        </svg>
        <!-- @24 -->
        <svg width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 6 C 6 4, 8 2, 10 2 L 38 2 C 40 2, 42 4, 42 6 L 42 44 C 42 46, 40 48, 38 48 L 10 48 C 8 48, 6 46, 6 44 Z" fill="#F7F3EE" stroke="#1F1B16" stroke-width="1.8"/>

        </svg>
      </div>
    </div>
  </section>

      <svg width="360" height="82" viewBox="0 0 280 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(4 8)">
          <ellipse cx="24" cy="46" rx="22" ry="2.5" fill="#1F1B16" fill-opacity="0.10"/>

        <g transform="translate(60 0)">
          <text x="0" y="40" font-family="'Cormorant Garamond','EB Garamond',Georgia,serif" font-size="34" font-weight="500" font-style="italic" fill="#1F1B16" letter-spacing="-0.5">InstaStash</text>

  <section>
    <div class="label">On dark</div>
    <div class="card dark">
      <svg width="96" height="96" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 6 C 6 4, 8 2, 10 2 L 38 2 C 40 2, 42 4, 42 6 L 42 44 C 42 46, 40 48, 38 48 L 10 48 C 8 48, 6 46, 6 44 Z" fill="#2a241d" stroke="#F7F3EE" stroke-width="1.8"/>

</body>
</html>
