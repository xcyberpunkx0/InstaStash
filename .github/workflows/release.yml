name: Build & Release

# Builds the Windows and macOS installers. On a version tag (v*) it also
# publishes them to a GitHub Release. The macOS build runs on a GitHub-hosted
# Mac runner, so no local Mac is required.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Needed so the GITHUB_TOKEN can create the GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            builder_flag: '--win'
          - os: macos-latest
            builder_flag: '--mac'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # Skip youtube-dl-exec's postinstall binary download: it hits the
          # anonymous GitHub API (rate-limited on shared runner IPs) and the
          # app bundles its own yt-dlp via fetch-binaries instead.
          YOUTUBE_DL_SKIP_DOWNLOAD: 'true'

      - name: Fetch yt-dlp binary for this platform
        run: npm run fetch-binaries

      - name: Build UI (static export)
        run: npm run build

      - name: Build Electron bundle
        run: npm run build:electron

      - name: Package installer
        run: npx electron-builder ${{ matrix.builder_flag }} --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
          if-no-files-found: ignore

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/*.exe
            release/*.dmg
